{% if not groups %}
<p><em>Aucune donnée — sélectionnez un anime ou lancez un ingest.</em></p>
{% else %}
<div style="overflow-x:auto;">
<table>
  <thead>
    <tr>
      <th>Sources</th>
      <th>episode_absolute</th>
      <th style="text-align:center">AniDB</th>
      <th style="text-align:center">MAL</th>
      <th style="text-align:center">SIMKL</th>
      <th style="text-align:center">TVDB</th>
      <th style="text-align:center">TMDB</th>
    </tr>
  </thead>
  <tbody>
    {% for g in groups %}
    {% include "partials/row.html" %}
    {% endfor %}
  </tbody>
</table>
</div>
<p style="font-size:0.8rem; color:var(--pico-muted-color); margin-top:0.5rem;">
  {{ groups|length }} groupe(s) affiché(s)
</p>
{% endif %}
