{% if not groups %}
<p class="text-slate-400 text-sm italic">Aucune donnée — sélectionnez un anime ou lancez un ingest.</p>
{% else %}
<div class="">
<table class="w-full text-sm border-collapse">
  <thead>
    <tr class="border-b border-slate-700">
      <th class="px-3 py-2 text-left text-xs text-slate-400 font-medium uppercase tracking-wider">Sources</th>
      <th class="px-3 py-2 text-left text-xs text-slate-400 font-medium uppercase tracking-wider font-mono">ea</th>
      <th class="px-3 py-2 text-center text-xs text-slate-400 font-medium uppercase tracking-wider">AniDB</th>

      <th class="px-3 py-2 text-center text-xs text-slate-400 font-medium uppercase tracking-wider">SIMKL</th>
      <th class="px-3 py-2 text-center text-xs text-slate-400 font-medium uppercase tracking-wider">TVDB</th>
      <th class="px-3 py-2 text-center text-xs text-slate-400 font-medium uppercase tracking-wider">TMDB</th>
    </tr>
  </thead>
  <tbody class="divide-y divide-slate-800/50">
    {% for g in groups %}
    {% include "partials/row.html" %}
    {% endfor %}
  </tbody>
</table>
</div>
<p class="text-xs text-slate-500 mt-2">{{ groups|length }} groupe(s) affiché(s)</p>
{% endif %}
