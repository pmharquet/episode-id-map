{% extends "base.html" %}
{% block title %}Comparaison – Episode ID Map{% endblock %}

{% block content %}
<h2 class="text-xl font-semibold mb-5">Comparaison des épisodes</h2>

{# ── Filtre série ── #}
<div class="flex gap-3 items-end mb-4 flex-wrap">
  <div class="flex-1 min-w-[240px]">
    <label class="block text-xs text-slate-400 mb-1" for="mal_series">Anime (MAL id_series)</label>
    <select id="mal_series" name="mal_series"
            hx-get="/partials/episodes-table"
            hx-target="#episodes-table"
            hx-swap="innerHTML"
            hx-include="[name='mal_series']"
            hx-trigger="change"
            class="w-full bg-slate-900 border border-slate-700 rounded px-3 py-2 text-slate-100 text-sm focus:outline-none focus:ring-1 focus:ring-blue-600">
      <option value="">— Tous les anime —</option>
      {% for s in series_list %}
      <option value="{{ s.mal_series }}" {% if s.mal_series == selected %}selected{% endif %}>
        MAL {{ s.mal_series }} ({{ s.full_groups }}/{{ s.total_episodes }} complets)
      </option>
      {% endfor %}
    </select>
  </div>
  {% if selected %}
  <a href="/episodes"
     class="bg-slate-800 hover:bg-slate-700 text-slate-300 px-3 py-2 rounded text-sm no-underline transition-colors">
    Réinitialiser
  </a>
  {% endif %}
</div>

{# ── Table ── #}
<div id="episodes-table">
  {% include "partials/episodes_table.html" %}
</div>

<script>
let _sortCol = null, _sortDir = 1;

function sortEpisodes(colIdx, type) {
  _sortDir = _sortCol === colIdx ? -_sortDir : 1;
  _sortCol = colIdx;

  const tbody = document.querySelector('#episodes-table tbody');
  if (!tbody) return;

  const rows = [...tbody.querySelectorAll('tr')];
  rows.sort((a, b) => {
    const ka = _cellKey(a.cells[colIdx], type);
    const kb = _cellKey(b.cells[colIdx], type);
    if (ka === kb) return 0;
    return (ka < kb ? -1 : 1) * _sortDir;
  });
  rows.forEach(r => tbody.appendChild(r));
  _updateIndicators(colIdx);
}

function _cellKey(cell, type) {
  if (!cell) return type === 'text' ? '￿' : Infinity;
  const tip = cell.querySelector('.tip');
  const text = (tip ? tip.textContent : cell.textContent).trim();

  if (!text || text === '—') return type === 'text' ? '￿' : Infinity;

  if (type === 'ep') {
    const m = text.match(/\d+/);
    return m ? parseInt(m[0]) : Infinity;
  }
  if (type === 'se') {
    const m = text.match(/S(\d+)E(\d+)/i);
    return m ? parseInt(m[1]) * 100000 + parseInt(m[2]) : Infinity;
  }
  if (type === 'badge') {
    const m = text.match(/(\d+)\/\d+/);
    return m ? parseInt(m[1]) : 0;
  }
  return text;
}

function _updateIndicators(activeCol) {
  document.querySelectorAll('.sort-indicator').forEach(el => {
    el.textContent = '⇅';
    el.classList.remove('text-blue-400');
    el.classList.add('opacity-40');
  });
  const active = document.querySelector(`.sort-indicator[data-col="${activeCol}"]`);
  if (active) {
    active.textContent = _sortDir === 1 ? '↑' : '↓';
    active.classList.remove('opacity-40');
    active.classList.add('text-blue-400');
  }
}

document.addEventListener('htmx:afterSwap', e => {
  if (e.detail.target.id === 'episodes-table') {
    _sortCol = null;
    _sortDir = 1;
  }
});
</script>

{% endblock %}
