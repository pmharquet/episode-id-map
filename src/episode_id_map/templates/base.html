<!DOCTYPE html>
<html lang="fr" class="bg-slate-950">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Episode ID Map{% endblock %}</title>
  <script type="module">
    import 'https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4'
  </script>
  <script src="https://unpkg.com/htmx.org@1.9.12" crossorigin="anonymous"></script>
  <style>
    /* HTMX */
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator,
    .htmx-request.htmx-indicator { display: inline; }
    /* Tooltip — pseudo-element */
    .tip { position: relative; cursor: help; }
    .tip::after {
      content: attr(data-tip);
      position: absolute; left: 50%; top: calc(100% + 6px);
      transform: translateX(-50%);
      background: #0f172a; border: 1px solid #334155;
      border-radius: 6px; padding: 8px 12px;
      white-space: pre; font-family: monospace; font-size: 0.72rem;
      line-height: 1.55; color: #cbd5e1;
      z-index: 200; min-width: 310px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.14s ease;
      box-shadow: 0 4px 16px rgba(0,0,0,.6);
    }
    .tip:hover::after { opacity: 1; }
    td:last-child .tip::after,
    td:nth-last-child(2) .tip::after { left: auto; right: 0; transform: none; }
  </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">
  <nav class="border-b border-slate-800 px-6 py-3 flex items-center gap-6">
    <a href="/" class="font-semibold text-slate-100 no-underline hover:text-white">📺 Episode ID Map</a>
    <a href="/episodes" class="text-slate-400 no-underline hover:text-slate-200 text-sm">Comparaison</a>
  </nav>
  <main class="max-w-[1400px] mx-auto px-6 py-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
